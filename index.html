<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>租屋水電費分攤計算機</title>
<style>
  body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
  .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  h1 { text-align: center; color: #2c3e50; }
  .section { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
  
  @media (max-width: 600px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }

  label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #555; }
  input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
  
  /* 自動計算欄位的特殊樣式 */
  input[readonly] { background-color: #e9ecef; color: #7f8c8d; cursor: not-allowed; border: 1px dashed #ccc; }
  
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 15px; }
  th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
  th { background-color: #3498db; color: white; }
  tr:nth-child(even) { background-color: #f9f9f9; }
  .empty-room { color: #999; font-style: italic; }
  
  /* 驗證區塊樣式 */
  .summary-box { margin-top: 20px; padding: 15px; background-color: #e8f8f5; border-left: 5px solid #1abc9c; border-radius: 5px; display: none; }
  .summary-box h4 { margin: 0 0 10px 0; color: #16a085; }
</style>
</head>
<body>

<div class="container">
  <h1>水電費分攤計算機</h1>

  <div class="section">
    <h3>1. 參數設定區</h3>
    <div class="grid">
      <div><label>1-2樓 帳單總額</label><input type="number" id="bill12" value="0" oninput="calculate()"></div>
      <div><label>1-2樓 平均單價</label><input type="number" step="0.01" id="price12" value="0" oninput="calculate()"></div>
      <div><label>3-4樓 帳單總額</label><input type="number" id="bill34" value="0" oninput="calculate()"></div>
      <div><label>3-4樓 平均單價</label><input type="number" step="0.01" id="price34" value="0" oninput="calculate()"></div>
      <div><label>全棟水費總額</label><input type="number" id="waterBill" value="0" oninput="calculate()"></div>
      <div>
        <label>目前總人數 <span style="font-size: 12px; color: #e74c3c;">(系統自動計算)</span></label>
        <input type="number" id="totalPeople" value="0" readonly title="將根據下方的空房狀態自動計算">
      </div>
    </div>
  </div>

  <div class="section">
    <h3>2. 個人冷氣度數輸入區 <span style="font-size: 14px; color: #7f8c8d; font-weight: normal;">(無人居住請輸入 -1)</span></h3>
    <div class="grid-2" style="margin-bottom: 15px;">
      <div><label>2樓前 A 度數</label><input type="number" id="acA" value="-1" oninput="calculate()"></div>
      <div><label>2樓後 B 度數</label><input type="number" id="acB" value="-1" oninput="calculate()"></div>
    </div>
    <div class="grid-4">
      <div><label>3樓前 C 度數</label><input type="number" id="acC" value="-1" oninput="calculate()"></div>
      <div><label>3樓後 D 度數</label><input type="number" id="acD" value="-1" oninput="calculate()"></div>
      <div><label>4樓前 E 度數</label><input type="number" id="acE" value="-1" oninput="calculate()"></div>
      <div><label>4樓後 F 度數</label><input type="number" id="acF" value="-1" oninput="calculate()"></div>
    </div>
  </div>

  <div class="section">
    <h3>3. 計算結果明細</h3>
    <table>
      <thead>
        <tr>
          <th>姓名 (樓層)</th>
          <th>冷氣費</th>
          <th>樓層公攤</th>
          <th>一樓公設</th>
          <th>水費</th>
          <th>應繳總計</th>
        </tr>
      </thead>
      <tbody id="resultBody">
      </tbody>
    </table>

    <div id="summaryBox" class="summary-box">
      </div>
  </div>
</div>

<script>
function calculate() {
  // 取得數值 (防呆：若清空欄位，預設為 0)
  let bill12 = Math.max(0, parseFloat(document.getElementById('bill12').value) || 0);
  let price12 = parseFloat(document.getElementById('price12').value) || 0;
  let bill34 = Math.max(0, parseFloat(document.getElementById('bill34').value) || 0);
  let price34 = parseFloat(document.getElementById('price34').value) || 0;
  let waterBill = Math.max(0, parseFloat(document.getElementById('waterBill').value) || 0);

  let acA_raw = parseFloat(document.getElementById('acA').value) || 0;
  let acB_raw = parseFloat(document.getElementById('acB').value) || 0;
  let acC_raw = parseFloat(document.getElementById('acC').value) || 0;
  let acD_raw = parseFloat(document.getElementById('acD').value) || 0;
  let acE_raw = parseFloat(document.getElementById('acE').value) || 0;
  let acF_raw = parseFloat(document.getElementById('acF').value) || 0;

  // 判斷是否為空房 (-1)
  let isEmpty = {
    A: acA_raw === -1, B: acB_raw === -1,
    C: acC_raw === -1, D: acD_raw === -1, E: acE_raw === -1, F: acF_raw === -1
  };

  // 防呆：有效度數 (空房視為 0，其餘若是誤輸入負數也強制視為 0)
  let acA = isEmpty.A ? 0 : Math.max(0, acA_raw);
  let acB = isEmpty.B ? 0 : Math.max(0, acB_raw);
  let acC = isEmpty.C ? 0 : Math.max(0, acC_raw);
  let acD = isEmpty.D ? 0 : Math.max(0, acD_raw);
  let acE = isEmpty.E ? 0 : Math.max(0, acE_raw);
  let acF = isEmpty.F ? 0 : Math.max(0, acF_raw);

  // 防呆：自動計算實際有住人的人數
  let activeCount2F = (isEmpty.A ? 0 : 1) + (isEmpty.B ? 0 : 1);
  let activeCount4F = (isEmpty.C ? 0 : 1) + (isEmpty.D ? 0 : 1) + (isEmpty.E ? 0 : 1) + (isEmpty.F ? 0 : 1);
  let totalPeople = activeCount2F + activeCount4F;
  
  // 更新介面上的總人數
  document.getElementById('totalPeople').value = totalPeople;

  // 防呆：避免分母為0
  if (price12 <= 0) price12 = 1;
  if (price34 <= 0) price34 = 1;
  let calcPeople = totalPeople > 0 ? totalPeople : 1; 

  // 中間邏輯計算
  let totalAcDegree2F = acA + acB;
  let totalAcDegree4F = acC + acD + acE + acF;

  // 防呆：一樓公設若因度數異常算成負數，最多只會歸零
  let public1F_raw = (((bill12 / price12) - totalAcDegree2F) / 2) * price12;
  let public1F = Math.max(0, public1F_raw);
  let public1FPerPerson = public1F / calcPeople;
  
  let waterPerPerson = waterBill / calcPeople;

  // 各樓層冷氣總費
  let totalAcCost2F = totalAcDegree2F * price12;
  let totalAcCost4F = totalAcDegree4F * price34;

  // 防呆：樓層公攤 (總額 / 該樓層非空房人數)，若算成負數最多只會歸零
  let public2FTotal = Math.max(0, bill12 - public1F - totalAcCost2F); 
  let public2FShare = activeCount2F > 0 ? (public2FTotal / activeCount2F) : 0; 
  
  let public4FTotal = Math.max(0, bill34 - totalAcCost4F); 
  let public4FShare = activeCount4F > 0 ? (public4FTotal / activeCount4F) : 0;

  const tenants = [
    { name: '2樓前 A', floor: '2樓', degree: acA, price: price12, floorShare: public2FShare, empty: isEmpty.A },
    { name: '2樓後 B', floor: '2樓', degree: acB, price: price12, floorShare: public2FShare, empty: isEmpty.B },
    { name: '3樓前 C', floor: '34樓', degree: acC, price: price34, floorShare: public4FShare, empty: isEmpty.C },
    { name: '3樓後 D', floor: '34樓', degree: acD, price: price34, floorShare: public4FShare, empty: isEmpty.D },
    { name: '4樓前 E', floor: '34樓', degree: acE, price: price34, floorShare: public4FShare, empty: isEmpty.E },
    { name: '4樓後 F', floor: '34樓', degree: acF, price: price34, floorShare: public4FShare, empty: isEmpty.F }
  ];

  let tbody = document.getElementById('resultBody');
  tbody.innerHTML = '';
  
  // 用來加總所有房客應繳總額的變數
  let totalCollected = 0;

  tenants.forEach(t => {
    if (t.empty) {
      let tr = document.createElement('tr');
      tr.className = 'empty-room';
      tr.innerHTML = `
        <td>${t.name} (${t.floor}) [空房]</td>
        <td>$0</td>
        <td>$0</td>
        <td>$0</td>
        <td>$0</td>
        <td>$0</td>
      `;
      tbody.appendChild(tr);
    } else {
      let acCost = t.degree * t.price;
      let total = acCost + t.floorShare + public1FPerPerson + waterPerPerson;
      let roundedTotal = Math.round(total);
      
      // 將四捨五入後的個人金額加入總和
      totalCollected += roundedTotal;
      
      let tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${t.name} (${t.floor})</td>
        <td>$${acCost.toFixed(1)}</td>
        <td>$${t.floorShare.toFixed(1)}</td>
        <td>$${public1FPerPerson.toFixed(1)}</td>
        <td>$${waterPerPerson.toFixed(1)}</td>
        <td style="font-weight:bold; color:#e74c3c; font-size: 16px;">$${roundedTotal}</td>
      `;
      tbody.appendChild(tr);
    }
  });

  // 驗證比對邏輯
  let totalInputBills = bill12 + bill34 + waterBill;
  let summaryBox = document.getElementById('summaryBox');
  
  // 只有當總帳單大於 0 的時候才顯示比對區塊
  if (totalInputBills > 0) {
    summaryBox.style.display = 'block';
    
    let difference = totalCollected - totalInputBills;
    let diffText = "";
    
    if (difference > 0) {
      diffText = `<span style="color: #27ae60;">多出 $${Math.round(difference * 10) / 10}</span>`;
    } else if (difference < 0) {
      diffText = `<span style="color: #e74c3c;">短少 $${Math.abs(Math.round(difference * 10) / 10)}</span>`;
    } else {
      diffText = `<span style="color: #2980b9;">完全吻合</span>`;
    }

    summaryBox.innerHTML = `
      <h4>結算比對驗證</h4>
      <div class="grid-3" style="font-size: 15px;">
        <div><strong>輸入帳單總額 (水+電)：</strong><br>$${totalInputBills}</div>
        <div><strong>應收總計加總 (各房客)：</strong><br><span style="color: #e74c3c; font-weight: bold; font-size: 16px;">$${totalCollected}</span></div>
        <div><strong>四捨五入差額：</strong><br>${diffText} <br><span style="font-size: 12px; color: #7f8c8d;">(尾數進位落差屬正常現象)</span></div>
      </div>
    `;
  } else {
    summaryBox.style.display = 'none';
  }
}

window.onload = calculate;
</script>

</body>
</html>
